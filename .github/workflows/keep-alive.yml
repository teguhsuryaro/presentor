name: Keep Supabase Alive & Cleanup

on:
  schedule:
    # Jalankan setiap 6 hari sekali (agar project tidak idle 7+ hari)
    - cron: '0 6 */6 * *'
  workflow_dispatch: # Bisa dijalankan manual

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/sessions?select=count&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase response: $response"
          if [ "$response" -ne 200 ]; then
            echo "::warning::Supabase returned $response"
          fi

  cleanup-trash:
    runs-on: ubuntu-latest
    steps:
      - name: Clean expired trash sessions
        run: |
          curl -X DELETE \
            "${{ secrets.SUPABASE_URL }}/rest/v1/sessions?deleted_at=not.is.null&permanently_delete_at=lte.$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json"
          echo "Trash cleanup completed"
